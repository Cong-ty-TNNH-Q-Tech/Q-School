# Alembic Configuration
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Đường dẫn đến thư mục chứa các migration scripts
script_location = alembic

# Template file cho migration scripts mới
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone cho tên file migration
timezone = Asia/Ho_Chi_Minh

# DATABASE_URL được load từ app/core/config.py (KHÔNG hardcode ở đây)
# env.py sẽ import settings và set sqlalchemy.url tự động
sqlalchemy.url =

[post_write_hooks]
# Tự động format file migration với black nếu có
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
