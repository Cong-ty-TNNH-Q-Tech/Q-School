version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: qschool_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-qschool}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: qschool_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qschool_backend
    restart: always
    environment:
      # asyncpg driver prefix bắt buộc cho SQLAlchemy async
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-qschool}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DEBUG=false
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qschool_celery_worker
    restart: always
    environment:
      # asyncpg driver prefix bắt buộc cho SQLAlchemy async
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-qschool}
      # psycopg2 sync driver — dùng cho Celery on_failure DB update (sync context, không có async loop)
      - SYNC_DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-qschool}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    command: celery -A app.core.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qschool_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # VITE_API_URL: browser (host machine) gọi backend qua cổng exposed 8000
      # Không dùng 'http://backend:8000' vì browser không resolve Docker internal hostname
      - VITE_API_URL=http://localhost:8000/api/v1
    command: npm run dev -- --host 0.0.0.0

  adminer:
    image: adminer
    container_name: qschool_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  # vllm:
  #   image: vllm/vllm-openai:latest
  #   container_name: qschool_vllm
  #   restart: always
  #   runtime: nvidia
  #   ports:
  #     - "8001:8000"
  #   volumes:
  #     - ~/.cache/huggingface:/root/.cache/huggingface
  #   command: --model Qwen/Qwen2.5-7B-Instruct --dtype auto --api-key ${VLLM_API_KEY:-dev_key}

volumes:
  postgres_data:
