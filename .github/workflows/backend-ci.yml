name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install linters
        run: pip install flake8 black

      - name: Check formatting (Black)
        working-directory: backend
        run: |
          black --check --diff app/ || {
            echo "::warning::Code formatting issues found. Run: black app/"
          }

      - name: Lint with flake8 (syntax errors)
        working-directory: backend
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (warnings)
        working-directory: backend
        run: flake8 app/ --count --max-line-length=120 --statistics --exit-zero

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        working-directory: backend
        run: |
          bandit -r app/ -ll -ii --skip B101 -f json -o bandit-report.json || true
          bandit -r app/ -ll -ii --skip B101 || echo "::warning::Security issues found (see bandit output above)"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-security-report
          path: backend/bandit-report.json
          retention-days: 7

  migration:
    name: Migration Verification
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: qschool_test
          POSTGRES_PASSWORD: qschool_test_password
          POSTGRES_DB: qschool_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://qschool_test:qschool_test_password@localhost:5432/qschool_test
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      VLLM_API_URL: http://localhost:8001/v1
      VLLM_MODEL_NAME: test-model
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: qschool-test
      APP_ENV: development
      DEBUG: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable PostgreSQL extensions
        run: |
          PGPASSWORD=qschool_test_password psql -h localhost -U qschool_test -d qschool_test -c "
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
          "

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Alembic migrations (upgrade head)
        working-directory: backend
        run: |
          echo "=== Running: alembic upgrade head ==="
          alembic upgrade head
          echo "=== Migration chain applied successfully ==="

      - name: Verify current migration head
        working-directory: backend
        run: |
          echo "=== Current Alembic head ==="
          alembic current
          echo ""
          echo "=== Migration history ==="
          alembic history --verbose

      - name: Check for model drift (alembic check)
        working-directory: backend
        run: |
          alembic check 2>&1 || {
            echo "::warning::Alembic detected model changes not covered by migrations."
            echo "::warning::Run 'alembic revision --autogenerate -m \"description\"' to create a new migration."
          }

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: qschool_test
          POSTGRES_PASSWORD: qschool_test_password
          POSTGRES_DB: qschool_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://qschool_test:qschool_test_password@localhost:5432/qschool_test
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      VLLM_API_URL: http://localhost:8001/v1
      VLLM_MODEL_NAME: test-model
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: qschool-test
      APP_ENV: development
      DEBUG: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable PostgreSQL extensions
        run: |
          PGPASSWORD=qschool_test_password psql -h localhost -U qschool_test -d qschool_test -c "
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
          "

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        working-directory: backend
        run: |
          if [ -d "tests" ]; then
            pytest tests/ \
              --cov=app \
              --cov-report=xml:coverage.xml \
              --cov-report=term-missing \
              --cov-fail-under=30 \
              -v --tb=short
          else
            echo "::warning::No tests directory found. Skipping tests."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7
