name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: qschool
          POSTGRES_PASSWORD: qschool_password
          POSTGRES_DB: qschool
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://qschool:qschool_password@localhost:5432/qschool_test
      SECRET_KEY: ci-test-secret-key-not-for-production-use
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      VLLM_API_URL: http://localhost:8000
      VLLM_MODEL_NAME: test-model
      S3_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: qschool
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Create test database and enable pgvector
        run: |
          PGPASSWORD=qschool_password psql -h localhost -U qschool -d qschool -c "CREATE DATABASE qschool_test;"
          PGPASSWORD=qschool_password psql -h localhost -U qschool -d qschool_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "No requirements.txt found"
          pip install pytest pytest-cov pytest-asyncio httpx flake8 black

      - name: Run tests with coverage
        working-directory: backend
        run: |
          if [ -d "tests" ]; then
            pytest tests/ --cov=app --cov-report=xml --cov-fail-under=30
          else
            echo "No tests directory found. Skipping tests."
          fi

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 5

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linter
        run: pip install flake8 black

      - name: Check code formatting (Black)
        working-directory: backend
        run: black --check app tests || echo "Black formatting check failed. Please format code."

      - name: Lint with flake8
        working-directory: backend
        run: flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Flake8 found syntax errors"
