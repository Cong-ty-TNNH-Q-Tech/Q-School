openapi: 3.0.3
info:
  title: Q-School AI API (Enterprise Edition - Final)
  description: Robust API documentation for Q-School AI LMS. Fully compliant with Hexagonal Architecture standard responses, token lifecycles, and edge cases.
  version: 1.2.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local Development Server
  - url: https://api.qschool.vn/api/v1
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ----------------------------------------
    # BASE WRAPPERS (Standard Responses)
    # ----------------------------------------
    StandardError:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: "Invalid input parameters"
        error_code:
          type: integer
          example: 4001
          
    TooManyRequestsError:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: "Rate limit exceeded. Please try again later."
        error_code:
          type: integer
          example: 4290
        retry_after:
          type: integer
          description: Số giây cần chờ trước khi thử lại
          example: 60
          
    PaymentRequiredError:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: "Payment required. Please upgrade your subscription plan."
        error_code:
          type: integer
          example: 4020
          
    PaymentRequiredError:
      type: object
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: "Payment required. Please upgrade your subscription plan."
        error_code:
          type: integer
          example: 4020
          
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        total_pages:
          type: integer
        total_items:
          type: integer

    # ----------------------------------------
    # CORE DOMAIN SCHEMAS
    # ----------------------------------------
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [teacher, student, admin]
        is_active:
          type: boolean
          
    ProfileResponse:
      type: object
      properties:
        full_name:
          type: string
        avatar_url:
          type: string
        school_name:
          type: string
        points:
          type: integer

    ClassAssignmentResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        resource_type:
          type: string
          enum: [lesson, quiz]
        resource_id:
          type: string
          format: uuid
        due_date:
          type: string
          format: date-time

    QuizDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        questions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              content:
                type: string
              options:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    text:
                      type: string
          description: "Danh sách câu hỏi (Đã ẩn đáp án đúng đối với Học sinh)"

    # ----------------------------------------
    # REQUEST PAYLOADS
    # ----------------------------------------
    AssignResourceRequest:
      type: object
      required: [resource_type, resource_id, due_date]
      properties:
        resource_type:
          type: string
          enum: [lesson, quiz]
        resource_id:
          type: string
          format: uuid
        due_date:
          type: string
          format: date-time

    QuizAttemptRequest:
      type: object
      required: [student_answers]
      properties:
        student_answers:
          type: array
          items:
            type: object
            required: [question_id, selected_answer_id]
            properties:
              question_id:
                type: string
                format: uuid
              selected_answer_id:
                type: string
                format: uuid

    EssaySubmissionRequest:
      type: object
      required: [rubric_id, content]
      properties:
        rubric_id:
          type: string
          format: uuid
        content:
          type: string
          description: "Bài làm tự luận của học sinh"

    AssetGenerationRequest:
      type: object
      required: [asset_type, input_params]
      properties:
        asset_type:
          type: string
          enum: [email, iep, behavior_intervention, report_comment]
        input_params:
          type: object
          description: "Thông số đầu vào dạng JSON (VD: Tên học sinh, lỗi vi phạm)"

    # ----------------------------------------
    # AI PROMPTS SCHEMAS (Issue #114)
    # ----------------------------------------
    AIPromptResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        persona_name:
          type: string
          example: "Raina"
        system_prompt_template:
          type: string
          example: "Bạn là Raina, trợ lý AI thân thiện..."
        version:
          type: string
          example: "v1.0"
        updated_at:
          type: string
          format: date-time

    CreateAIPromptRequest:
      type: object
      required: [persona_name, system_prompt_template]
      properties:
        persona_name:
          type: string
          maxLength: 100
          example: "Raina"
          description: "Tên nhân vật AI — phải là duy nhất"
        system_prompt_template:
          type: string
          minLength: 10
          description: "Nội dung System Prompt truyền vào LLM"
        version:
          type: string
          default: "v1.0"
          maxLength: 20

    UpdateAIPromptRequest:
      type: object
      description: "PATCH — tất cả fields đều optional (partial update)"
      properties:
        system_prompt_template:
          type: string
          minLength: 10
          description: "Nội dung System Prompt mới"
        version:
          type: string
          maxLength: 20
          example: "v2.0"


  # ----------------------------------------
  # COMMON PARAMETERS
  # ----------------------------------------
  parameters:
    PageParam:
      name: page
      in: query
      description: Tới trang số mấy
      required: false
      schema:
        type: integer
        default: 1
    LimitParam:
      name: limit
      in: query
      description: Số dòng trên 1 trang
      required: false
      schema:
        type: integer
        default: 20
    CursorParam:
      name: cursor
      in: query
      description: ID của phần tử cuối cùng để tải trang tiếp theo (tránh dùng page cho dữ liệu lớn)
      required: false
      schema:
        type: string
        format: uuid

security:
  - bearerAuth: []

paths:
  # ==========================================
  # GROUP 1: AUTH & USERS (Token Lifecycle)
  # ==========================================
  /auth/login:
    post:
      summary: Đăng nhập cấp Token
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string
                      token_type:
                        type: string
        '401':
          description: Sai mật khẩu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

  /auth/refresh:
    post:
      summary: Làm mới Access Token bằng Refresh Token (Chống văng app)
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token mới được cấp phát
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      token_type:
                        type: string

  /auth/logout:
    post:
      summary: Đăng xuất và Revoke Token
      tags: [Authentication]
      responses:
        '200':
          description: Đăng xuất thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: "Logged out successfully"

  /users/me:
    get:
      summary: Lấy thông tin cá nhân
      tags: [Users]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    allOf:
                      - $ref: '#/components/schemas/UserResponse'
                      - type: object
                        properties:
                          profile:
                            $ref: '#/components/schemas/ProfileResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

  # ==========================================
  # GROUP 2: EDTECH CORE (Teacher Operations)
  # ==========================================
  /classes:
    get:
      summary: Lấy danh sách Lớp học (Có phân trang)
      tags: [Classes]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /classes/{class_id}/assignments:
    get:
      summary: Lấy danh sách Bài tập của Lớp (Phân trang)
      tags: [Classes]
      parameters:
        - name: class_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClassAssignmentResponse'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      summary: Giao bài tập (Lesson/Quiz) cho Lớp
      tags: [Classes]
      parameters:
        - name: class_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignResourceRequest'
      responses:
        '201':
          description: Giao bài thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      assignment_id:
                        type: string
                        format: uuid

  /lesson-generation-tasks:
    post:
      summary: AI Sinh Giáo Án (Async Queue)
      tags: [EdTech Core]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt, subject, grade_level]
              properties:
                prompt:
                  type: string
                subject:
                  type: string
                grade_level:
                  type: string
      responses:
        '202':
          description: Tác vụ đã được đưa vào Hàng đợi
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      task_id:
                        type: string
                        format: uuid
                  message:
                    type: string
                    example: "AI đang sinh giáo án, vui lòng chờ."
        '429':
          description: Quá tải hệ thống AI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'

  # ==========================================
  # GROUP 3: STUDENT TRACKING (Quizzes & Submissions)
  # ==========================================
  /quizzes/{quiz_id}:
    get:
      summary: Lấy nội dung Đề thi Trắc nghiệm (Học sinh)
      tags: [Student Tracking]
      parameters:
        - name: quiz_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chi tiết đề thi (không bao gồm đáp án đúng)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/QuizDetailResponse'

  /quizzes/{quiz_id}/attempts:
    post:
      summary: Nộp bài thi Trắc nghiệm
      tags: [Student Tracking]
      parameters:
        - name: quiz_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizAttemptRequest'
      responses:
        '200':
          description: Chấm điểm thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      attempt_id:
                        type: string
                        format: uuid
                      score:
                        type: number

  /essays/submissions:
    post:
      summary: Nộp bài Văn tự luận (AI Tự Động Chấm)
      tags: [Student Tracking]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EssaySubmissionRequest'
      responses:
        '200':
          description: Nộp bài thành công (Có thể Async tùy cấu hình)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      submission_id:
                        type: string
                        format: uuid
                      ai_feedback:
                        type: object
                        description: "Nhận xét chi tiết từ AI"

  /flashcard-sets/{set_id}/reviews:
    get:
      summary: Lấy danh sách thẻ bài cần ôn tập hôm nay (Spaced Repetition)
      tags: [Student Tracking]
      parameters:
        - name: set_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Danh sách thẻ
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        flashcard_id:
                          type: string
                          format: uuid
                        front_text:
                          type: string

  /flashcards/{flashcard_id}/reviews:
    post:
      summary: Lưu kết quả ôn tập thẻ bài (Spaced Repetition)
      tags: [Student Tracking]
      parameters:
        - name: flashcard_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confidence_level]
              properties:
                confidence_level:
                  type: integer
                  description: "Mức độ tự tin: 1 (Quên sạch) đến 5 (Rất thuộc)"
                  minimum: 1
                  maximum: 5
      responses:
        '201':
          description: Đã lưu kết quả ôn tập
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      review_id:
                        type: string
                        format: uuid
                      next_review_at:
                        type: string
                        format: date-time

  # ==========================================
  # GROUP 4: AI WORKSPACE & RAG (SSE included)
  # ==========================================
  /generated-assets:
    post:
      summary: Nhờ AI soạn Email / IEP / Nhận xét sổ liên lạc
      tags: [AI Workspace]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetGenerationRequest'
      responses:
        '200':
          description: Đã sinh văn bản thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      asset_id:
                        type: string
                        format: uuid
                      output_content:
                        type: object
                        description: "Nội dung văn bản AI sinh ra"
        '429':
          description: Quá tải hệ thống AI
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'

  /documents:
    post:
      summary: Tải file lên (PDF, Image) để làm RAG
      tags: [AI Workspace]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                knowledge_base_id:
                  type: string
                  format: uuid
                  description: "Phân loại tài liệu thuộc tệp kiến thức nào"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      document_id:
                        type: string
                        format: uuid
    get:
      summary: Lấy danh sách tài liệu RAG đã tải lên
      tags: [AI Workspace]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        filename:
                          type: string
                        status:
                          type: string
                          enum: [pending, parsing, ready, error]
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  /chat/sessions:
    post:
      summary: Tạo phòng Chat AI mới (Optional Context Document)
      tags: [AI Workspace]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                document_id:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                        format: uuid

  /chat/sessions/{session_id}/messages:
    post:
      summary: Send a message to AI Tutor (Stream SSE)
      description: |
        Endpoint này nhận tin nhắn của User và trả về luồng dữ liệu (Stream) từng chữ của AI sử dụng chuẩn Server-Sent Events (SSE). 
        Frontend đọc luồng này bằng `fetch()` hoặc `EventSource` để hiển thị chữ kiểu gõ phím.
      tags: [AI Workspace]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Event Stream (SSE) trả về từng chunk (mảnh văn bản)
          content:
            text/event-stream:
              schema:
                type: object
                description: 'Dữ liệu từng sự kiện SSE. Ví dụ: `data: {"chunk": "Xin", "is_final": false}`'
        '429':
          description: Quá tải Server GPU, Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
        '402':
          description: Hết lượt sử dụng, yêu cầu nâng cấp gói
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequiredError'
    get:
      summary: Lấy lịch sử tin nhắn của một phiên Chat AI
      tags: [AI Workspace]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Lịch sử hội thoại
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        sender_type:
                          type: string
                          enum: [user, ai]
                        content:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

  # ==========================================
  # GROUP 5: BILLING & SUBSCRIPTIONS
  # ==========================================

  /billing/plans:
    get:
      summary: Lấy danh sách các gói cước (SaaS Tiers)
      tags: [Billing]
      security: []
      responses:
        '200':
          description: Danh sách gói cước
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                          example: Pro
                        price:
                          type: integer
                          example: 99000
                        billing_cycle:
                          type: string
                          example: monthly
                        features:
                          type: object

  /billing/checkout:
    post:
      summary: Khởi tạo luồng thanh toán (Lấy link thanh toán)
      tags: [Billing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_id, provider]
              properties:
                plan_id:
                  type: string
                  format: uuid
                provider:
                  type: string
                  enum: [stripe, vnpay, momo]
      responses:
        '200':
          description: Link checkout thanh toán
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      checkout_url:
                        type: string
                        format: uri
                      transaction_id:
                        type: string
                        format: uuid

  /webhooks/payments:
    post:
      summary: Endpoint Webhook nhận IPN từ cổng thanh toán (Không yêu cầu Bearer token)
      tags: [Billing]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Xác nhận đã nhận Webhook
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success

  # ==========================================
  # GROUP 5: AI PROMPTS (Admin — Issue #114)
  # ==========================================
  /ai-prompts:
    post:
      summary: "[Admin] Tạo mới AI Prompt / Persona"
      tags: [AI Prompts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAIPromptRequest'
      responses:
        '201':
          description: Tạo Prompt thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/AIPromptResponse'
        '409':
          description: persona_name đã tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '403':
          description: Không đủ quyền Admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

    get:
      summary: "[Admin] Lấy danh sách tất cả AI Prompts"
      tags: [AI Prompts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AIPromptResponse'

  /ai-prompts/{id}:
    get:
      summary: Lấy chi tiết AI Prompt theo ID
      tags: [AI Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/AIPromptResponse'
        '404':
          description: Không tìm thấy Prompt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

    patch:
      summary: "[Admin] Cập nhật system_prompt_template / version"
      tags: [AI Prompts]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAIPromptRequest'
      responses:
        '200':
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/AIPromptResponse'
        '404':
          description: Không tìm thấy Prompt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '403':
          description: Không đủ quyền Admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
