                              profile:
                                $ref: '#/components/schemas/ProfileResponse'
                      tokens:
                        type: object
                        properties:
                          access_token:
                            type: string
                          refresh_token:
                            type: string
                          token_type:
                            type: string
                            example: bearer
                          expires_in:
                            type: integer
                            example: 900
                  message:
                    type: string
                    example: "Dang ky thanh cong"
        '409':
          description: Email hoac username da ton tai
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'
        '422':
          description: Du lieu khong hop le
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

  /auth/refresh:
    post:
      summary: Lam moi Access Token bang Refresh Token
      description: "Dung refresh_token de lay access_token moi. Tranh user phai login lai."
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token moi duoc cap phat
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      token_type:
                        type: string
                        example: bearer
                      expires_in:
                        type: integer
                        description: "So giay token con hieu luc"
                        example: 900
        '401':
          description: Refresh token khong hop le hoac het han
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

  /auth/logout:
    post:
      summary: ÄÄng xuášĨt vÃ  Revoke Token
