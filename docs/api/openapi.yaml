                    example: success
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                        format: uuid

  /chat/sessions/{session_id}/messages:
    post:
      summary: Send a message to AI Tutor (Stream SSE)
      description: |
        Endpoint này nhận tin nhắn của User và trả về luồng dữ liệu (Stream) từng chữ của AI sử dụng chuẩn Server-Sent Events (SSE). 
        Frontend đọc luồng này bằng `fetch()` hoặc `EventSource` để hiển thị chữ kiểu gõ phím.
      tags: [AI Workspace]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
      responses:
        '200':
          description: Event Stream (SSE) trả về từng chunk (mảnh văn bản)
          content:
            text/event-stream:
              schema:
                type: object
                description: 'Dữ liệu từng sự kiện SSE. Ví dụ: `data: {"chunk": "Xin", "is_final": false}`'
        '429':
          description: Quá tải Server GPU, Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsError'
        '402':
          description: Hết lượt sử dụng, yêu cầu nâng cấp gói
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRequiredError'
    get:
      summary: Lấy lịch sử tin nhắn của một phiên Chat AI
      tags: [AI Workspace]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Lịch sử hội thoại
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        sender_type:
                          type: string
                          enum: [user, ai]
                        content:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'

