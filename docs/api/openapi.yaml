  /auth/login:
    post:
      summary: Dang nhap cap Token
      description: "Dang nhap bang username (hoac email) + password. Tra ve access_token (15 phut) va refresh_token (7 ngay)."
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: "Username hoac email"
                password:
                  type: string
      responses:
        '200':
          description: Dang nhap thanh cong
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        allOf:
                          - $ref: '#/components/schemas/UserResponse'
                          - type: object
                            properties:
                              profile:
                                $ref: '#/components/schemas/ProfileResponse'
                      tokens:
                        type: object
                        properties:
                          access_token:
                            type: string
                          refresh_token:
                            type: string
                          token_type:
                            type: string
                            example: bearer
                          expires_in:
                            type: integer
                            description: "So giay token con hieu luc"
                            example: 900
                  message:
                    type: string
                    example: "Dang nhap thanh cong"
        '401':
          description: Sai mat khau hoac tai khoan bi khoa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardError'

  /auth/register:
    post:
      summary: Dang ky tai khoan moi
      description: "Tao tai khoan hoc sinh hoac giao vien moi. Tra ve tokens ngay sau khi dang ky."
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, email, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 50
                  pattern: "^[a-zA-Z0-9_-]+$"
                  description: "Chi cho phep chu cai, so, _, -"
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                role:
                  type: string
                  enum: [student, teacher]
                  default: student
      responses:
        '201':
          description: Dang ky thanh cong
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        allOf:
                          - $ref: '#/components/schemas/UserResponse'
                          - type: object
